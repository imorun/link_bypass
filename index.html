<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>PREMIUM LINK BYPASS ENGINE - Dark</title>
    <style>
        /* 1. 暗めの水色・紫・黒の動くグラデーション背景 */
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            /* 深みのある色合いに変更 */
            background: linear-gradient(-45deg, #0f2027, #203a43, #2c5364, #1a0a2e);
            background-size: 400% 400%;
            animation: gradientBG 12s ease infinite;
            overflow: hidden;
            color: white;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 2. ダークガラスカードデザイン */
        .card {
            background: rgba(255, 255, 255, 0.05); /* 非常に薄い白 */
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            text-align: center;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            max-width: 450px;
            width: 90%;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* 3. 虹色 ＋ 全体的に白をかけた見出し（暗い背景で映える） */
        h1 {
            font-size: 28px;
            margin-bottom: 30px;
            /* 虹色をベースに、白の透過率を調整して「白がかった光」を表現 */
            background: linear-gradient(
                to right, 
                rgba(255,255,255,0.9) 0%, 
                #ff99cc 20%, 
                #99ccff 40%, 
                #cc99ff 60%, 
                #99ffff 80%,
                rgba(255,255,255,0.9) 100%
            );
            background-size: 200% auto;
            color: transparent;
            -webkit-background-clip: text;
            background-clip: text;
            animation: rainbowShift 3s linear infinite;
            font-weight: 900;
            letter-spacing: 1.5px;
            /* 外側に白い光を放つエフェクト（全体的な白っぽさ） */
            filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.5));
        }

        @keyframes rainbowShift {
            to { background-position: 200% center; }
        }

        /* 入力エリアとボタン */
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        input[type="text"] {
            padding: 14px 18px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            outline: none;
            font-size: 16px;
            background: rgba(0, 0, 0, 0.3); /* 入力欄を暗く */
            color: white;
            transition: all 0.3s;
        }

        input[type="text"]::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        input[type="text"]:focus {
            background: rgba(0, 0, 0, 0.5);
            border-color: #81D4FA;
            box-shadow: 0 0 10px rgba(129, 212, 250, 0.3);
        }

        button {
            padding: 14px;
            cursor: pointer;
            /* ダーク背景に映える鮮やかなグラデーションボタン */
            background: linear-gradient(135deg, #00d2ff, #92fe9d);
            color: #000; /* 文字は読みやすく黒に */
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0, 210, 255, 0.4);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 210, 255, 0.6);
            filter: brightness(1.1);
        }
    </style>
</head>
<body>

<div class="card">
    <h1>LINK BYPASS ENGINE</h1>
    
    <div class="input-group">
        <input type="text" id="link-input" placeholder="Paste URL">
        <button onclick="handleBypass()">Bypass Start</button>
    </div>
</div>

<script>
    function handleBypass() {
        const input = document.getElementById('link-input');
        const targetUrl = input.value.trim();

        if (targetUrl) {
            const url = `https://bypass.city/bypass?bypass=${encodeURIComponent(targetUrl)}`;
            window.location.href = url;
        } else {
            alert("URLを入力してください");
        }
    }

    document.getElementById('link-input').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') handleBypass();
    });
</script>

</body>
</html>
